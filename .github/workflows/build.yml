name: Build and Sync Client App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 🔴 الحل اللي إنت جبته: تنظيف المشروع قبل البناء
      - name: Clean and Install Dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MasterStore-Client-APK
          path: build/app/outputs/flutter-apk/app-release.apk
