name: Build and Sync Client App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # صلاحية الكتابة والرفع للمستودع

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate Android Files
        run: flutter create . --platforms android

      # إرجاع المجلدات المنشأة للمستودع (Sync)
      - name: Push Generated Files back to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "GitHub Actions: Generated Client Android platform files" || echo "No changes to commit"
          git push
      
      - name: Install Dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MasterStore-Client-APK
          path: build/app/outputs/flutter-apk/app-release.apk
